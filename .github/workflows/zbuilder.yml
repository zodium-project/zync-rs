name: Build and Release

on:
  workflow_dispatch:
  push:
    branches:
      - stable
      - unstable
    paths:
      - "Cargo.lock"

jobs:
  zbuilder:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            suffix: musl-x86_64
          - target: aarch64-unknown-linux-musl
            suffix: musl-aarch64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Get Current Version and Branch
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -n1 | cut -d '"' -f2)
          BRANCH=${GITHUB_REF#refs/heads/}
          if [ "$BRANCH" = "unstable" ]; then
            BINARY_NAME="zync-${VERSION}-unstable-${{ matrix.suffix }}"
          else
            BINARY_NAME="zync-${VERSION}-${{ matrix.suffix }}"
          fi
          echo "BINARY_NAME=$BINARY_NAME" >> $GITHUB_ENV

      - name: Install targets and cross-compile tools
        run: |
          rustup target add ${{ matrix.target }}
          cargo install cross --locked

      - name: Build Release Binary
        run: cross build --release --locked --target ${{ matrix.target }}

      - name: Rename and Strip Binary
        run: |
          mv target/${{ matrix.target }}/release/zync ${{ env.BINARY_NAME }}
          strip ${{ env.BINARY_NAME }} || true

      - name: Upload binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}
          path: ${{ env.BINARY_NAME }}

  verify-versions:
    needs: zbuilder
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check Cargo.toml version
        id: check
        run: |
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -n1 | cut -d '"' -f2)
          echo "Cargo.toml version: $CARGO_VERSION"
          echo "version=$CARGO_VERSION" >> $GITHUB_OUTPUT

  create-tag:
    needs: verify-versions
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.info.outputs.tag }}
      release_name: ${{ steps.info.outputs.release_name }}
      prerelease: ${{ steps.info.outputs.prerelease }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Release Tag and Release
        id: info
        run: |
          VERSION=${{ needs.verify-versions.outputs.version }}
          BRANCH=${GITHUB_REF#refs/heads/}
          if [ "$BRANCH" = "unstable" ]; then
            TAG="v${VERSION}-unstable"
            RELEASE_NAME="zync v${VERSION} (unstable)"
            PRERELEASE="true"
          else
            TAG="v${VERSION}"
            RELEASE_NAME="zync v${VERSION}"
            PRERELEASE="false"
          fi
          git tag $TAG
          git push origin $TAG
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "release_name=$RELEASE_NAME" >> $GITHUB_OUTPUT
          echo "prerelease=$PRERELEASE" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.info.outputs.tag }}
          name: ${{ steps.info.outputs.release_name }}
          prerelease: ${{ steps.info.outputs.prerelease }}

  upload-binaries:
    needs: create-tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            suffix: musl-x86_64
          - target: aarch64-unknown-linux-musl
            suffix: musl-aarch64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get binary name
        run: |
          VERSION=${{ needs.create-tag.outputs.tag }}
          VERSION=${VERSION#v}
          BRANCH=${GITHUB_REF#refs/heads/}
          if [ "$BRANCH" = "unstable" ]; then
            VERSION=${VERSION%-unstable}
            BINARY_NAME="zync-${VERSION}-unstable-${{ matrix.suffix }}"
          else
            BINARY_NAME="zync-${VERSION}-${{ matrix.suffix }}"
          fi
          echo "BINARY_NAME=$BINARY_NAME" >> $GITHUB_ENV

      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-tag.outputs.tag }}
          files: ${{ env.BINARY_NAME }}